<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Kurs — Sokraft & FTN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-logo">Sokraft AI</div>
    <ul class="nav-links">
      <li><a href="#o-nama" data-i18n="nav.about"></a></li>
      <li><a href="#organizacija" data-i18n="nav.setup"></a></li>
      <li><a href="#lekcije" data-i18n="nav.lessons"></a></li>
      <li><a href="#kontakt" data-i18n="nav.contact"></a></li>
    </ul>
    <div class="nav-right">
      <div class="lang-switcher">
        <button onclick="setLanguage('sr')">SR</button>
        <button onclick="setLanguage('en')">EN</button>
      </div>
      <a href="#kontakt" class="btn btn-nav" data-i18n="nav.cta"></a>
    </div>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <div class="hero-inner">
      <div class="hero-tag" data-i18n="hero.tag"></div>
      <h1 data-i18n="hero.title"></h1>
      <p class="hero-sub" data-i18n="hero.subtitle"></p>
      <div class="hero-actions">
        <a href="#kontakt" class="btn btn-primary" data-i18n="hero.cta"></a>
        <a href="#lekcije" class="btn btn-outline" data-i18n="hero.cta2"></a>
      </div>
    </div>
  </section>

  <!-- ORGANIZACIJA KURSA -->
  <section id="organizacija">
    <div class="section-inner">
      <h2 data-i18n="courseSetup.heading"></h2>
      <div class="info-grid">
        <div class="info-card info-card--wide info-card--blue">
          <h3 data-i18n="courseSetup.cards.what.title"></h3>
          <p data-i18n="courseSetup.cards.what.body"></p>
        </div>
        <div class="info-card info-card--green">
          <h3 data-i18n="courseSetup.cards.who.title"></h3>
          <p data-i18n="courseSetup.cards.who.body"></p>
        </div>
        <div class="info-card info-card--yellow">
          <h3 data-i18n="courseSetup.cards.notWhat.title"></h3>
          <p data-i18n="courseSetup.cards.notWhat.body"></p>
        </div>
        <div class="info-card info-card--wide info-card--pink">
          <h3 data-i18n="courseSetup.cards.notWho.title"></h3>
          <p data-i18n="courseSetup.cards.notWho.body"></p>
        </div>
      </div>
      <p class="setup-desc" data-i18n="courseSetup.p1"></p>
    </div>
  </section>

  <!-- LEKCIJE -->
  <section id="lekcije">
    <div class="section-inner">
      <h2 data-i18n="curriculum.heading"></h2>
      <div class="tree">

        <div class="tree-root-row">
          <div class="curriculum-part part-intro">
            <h3>
              <span class="part-label" data-i18n="curriculum.part0.label"></span>
              <span class="part-title" data-i18n="curriculum.part0.title"></span>
            </h3>
            <ol>
              <li>
                <button class="session-header" aria-expanded="false">
                  <span data-i18n="curriculum.part0.session0"></span>
                </button>
                <div class="session-body"><p data-i18n="curriculum.part0.session0_content"></p></div>
              </li>
            </ol>
          </div>
        </div>

        <div class="tree-connector" aria-hidden="true"></div>

        <div class="tree-children">

          <div class="curriculum-part part-1">
            <h3>
              <span class="part-label" data-i18n="curriculum.part1.label"></span>
              <span class="part-title" data-i18n="curriculum.part1.title"></span>
            </h3>
            <ol>
              <li><button class="session-header" aria-expanded="false"><span data-i18n="curriculum.part1.session1"></span></button><div class="session-body"><p data-i18n="curriculum.part1.session1_content"></p></div></li>
              <li><button class="session-header" aria-expanded="false"><span data-i18n="curriculum.part1.session2"></span></button><div class="session-body"><p data-i18n="curriculum.part1.session2_content"></p></div></li>
              <li><button class="session-header" aria-expanded="false"><span data-i18n="curriculum.part1.session3"></span></button><div class="session-body"><p data-i18n="curriculum.part1.session3_content"></p></div></li>
              <li><button class="session-header" aria-expanded="false"><span data-i18n="curriculum.part1.session4"></span></button><div class="session-body"><p data-i18n="curriculum.part1.session4_content"></p></div></li>
              <li><button class="session-header" aria-expanded="false"><span data-i18n="curriculum.part1.session5"></span></button><div class="session-body"><p data-i18n="curriculum.part1.session5_content"></p></div></li>
              <li><button class="session-header" aria-expanded="false"><span data-i18n="curriculum.part1.session6"></span></button><div class="session-body"><p data-i18n="curriculum.part1.session6_content"></p></div></li>
              <li><button class="session-header" aria-expanded="false"><span data-i18n="curriculum.part1.session7"></span></button><div class="session-body"><p data-i18n="curriculum.part1.session7_content"></p></div></li>
            </ol>
          </div>

          <div class="curriculum-part part-2">
            <h3>
              <span class="part-label" data-i18n="curriculum.part2.label"></span>
              <span class="part-title" data-i18n="curriculum.part2.title"></span>
            </h3>
            <ol start="8">
              <li><button class="session-header" aria-expanded="false"><span data-i18n="curriculum.part2.session8"></span></button><div class="session-body"><p data-i18n="curriculum.part2.session8_content"></p></div></li>
              <li><button class="session-header" aria-expanded="false"><span data-i18n="curriculum.part2.session9"></span></button><div class="session-body"><p data-i18n="curriculum.part2.session9_content"></p></div></li>
              <li><button class="session-header" aria-expanded="false"><span data-i18n="curriculum.part2.session10"></span></button><div class="session-body"><p data-i18n="curriculum.part2.session10_content"></p></div></li>
              <li><button class="session-header" aria-expanded="false"><span data-i18n="curriculum.part2.session11"></span></button><div class="session-body"><p data-i18n="curriculum.part2.session11_content"></p></div></li>
              <li><button class="session-header" aria-expanded="false"><span data-i18n="curriculum.part2.session12"></span></button><div class="session-body"><p data-i18n="curriculum.part2.session12_content"></p></div></li>
              <li><button class="session-header" aria-expanded="false"><span data-i18n="curriculum.part2.session13"></span></button><div class="session-body"><p data-i18n="curriculum.part2.session13_content"></p></div></li>
              <li><button class="session-header" aria-expanded="false"><span data-i18n="curriculum.part2.session14"></span></button><div class="session-body"><p data-i18n="curriculum.part2.session14_content"></p></div></li>
            </ol>
          </div>

        </div>
      </div>
    </div>
  </section>


  <!-- PRIJAVI SE -->
  <section id="prijavi-se">
    <div class="section-inner">
      <div class="apply-grid">
        <div class="apply-left">
          <h2 data-i18n="apply.heading"></h2>
          <p class="apply-sub" data-i18n="apply.note"></p>
        </div>
        <div class="apply-card">
          <div class="apply-price">
            <span data-i18n="apply.amount"></span><span data-i18n="apply.currency"></span>
          </div>
          <a href="#kontakt" class="btn apply-btn" data-i18n="apply.button"></a>
        </div>
      </div>
    </div>
  </section>

  <!-- KO SMO MI -->
  <section id="o-nama">
    <div class="section-inner">
      <h2 data-i18n="about.heading"></h2>
      <div class="about-text">
        <p data-i18n="about.p1"></p>
        <p data-i18n="about.p2"></p>
      </div>
    </div>
  </section>

  <!-- KONTAKT -->
  <section id="kontakt">
    <div class="section-inner">
      <h2 data-i18n="contact.heading"></h2>
      <div class="contact-grid">
        <div class="contact-info">
          <h3 data-i18n="contact.infoTitle"></h3>
          <p data-i18n="contact.infoDesc"></p>
          <div class="contact-details">
            <div class="contact-item">✉ <span>info@sokraft.com</span></div>
            <div class="contact-item">⌂ <span>Sokraft d.o.o, Novi Sad</span></div>
            <div class="contact-item">🎓 <span data-i18n="contact.partner"></span></div>
          </div>
        </div>
        <form class="contact-form" onsubmit="handleSubmit(event)">
          <div class="form-group">
            <label data-i18n="contact.form.name"></label>
            <input type="text" name="name" required data-i18n-placeholder="contact.form.namePlaceholder">
          </div>
          <div class="form-group">
            <label data-i18n="contact.form.email"></label>
            <input type="email" name="email" required placeholder="vas@email.com">
          </div>
          <div class="form-group">
            <label data-i18n="contact.form.company"></label>
            <input type="text" name="company" data-i18n-placeholder="contact.form.companyPlaceholder">
          </div>
          <div class="form-group">
            <label data-i18n="contact.form.message"></label>
            <textarea name="message" data-i18n-placeholder="contact.form.messagePlaceholder"></textarea>
          </div>
          <button type="submit" class="btn btn-primary" data-i18n="contact.form.submit"></button>
        </form>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <span>© 2025 Sokraft d.o.o. & FTN Novi Sad</span>
      <div class="lang-switcher">
        <button onclick="setLanguage('sr')">SR</button>
        <button onclick="setLanguage('en')">EN</button>
      </div>
    </div>
  </footer>

  <script src="js/i18n.js"></script>
  <script src="js/accordion.js"></script>
  <script src="js/tree.js"></script>
</body>
</html>
