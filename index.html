<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Course</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="hero">
    <div class="hero-overlay"></div>
    <nav class="lang-switcher">
      <button onclick="setLanguage('en')">EN</button>
      <button onclick="setLanguage('sr')">SR</button>
    </nav>
    <div class="hero-content">
      <h1 data-i18n="hero.title"></h1>
      <p data-i18n="hero.subtitle"></p>
    </div>
  </header>

  <section id="course-setup">
    <div class="about-inner">
      <h2 data-i18n="courseSetup.heading"></h2>

      <div class="info-grid">
        <div class="info-card info-card--main">
          <h3 data-i18n="courseSetup.cards.what.title"></h3>
          <p data-i18n="courseSetup.cards.what.body"></p>
        </div>
        <div class="info-card">
          <h3 data-i18n="courseSetup.cards.who.title"></h3>
          <p data-i18n="courseSetup.cards.who.body"></p>
        </div>
        <div class="info-card info-card--negative">
          <h3 data-i18n="courseSetup.cards.notWhat.title"></h3>
          <p data-i18n="courseSetup.cards.notWhat.body"></p>
        </div>
        <div class="info-card info-card--negative info-card--wide">
          <h3 data-i18n="courseSetup.cards.notWho.title"></h3>
          <p data-i18n="courseSetup.cards.notWho.body"></p>
        </div>
      </div>

      <p data-i18n="courseSetup.p1"></p>
    </div>
  </section>

  <main>
    <section id="curriculum">
      <div class="tree">

        <div class="tree-root-row">
          <div class="curriculum-part part-intro">
            <h3>
              <span class="section-label" data-i18n="curriculum.part0.label"></span>
              <span class="section-title" data-i18n="curriculum.part0.title"></span>
            </h3>
            <ol>
              <li>
                <button class="session-header" aria-expanded="false">
                  <span data-i18n="curriculum.part0.session0"></span>
                  
                </button>
                <div class="session-body"><p data-i18n="curriculum.part0.session0_content"></p></div>
              </li>
            </ol>
          </div>
        </div>

        <div class="tree-connector" aria-hidden="true"></div>

        <div class="tree-children">

          <div class="curriculum-part part-1">
            <h3>
              <span class="section-label" data-i18n="curriculum.part1.label"></span>
              <span class="section-title" data-i18n="curriculum.part1.title"></span>
            </h3>
            <ol>
              <li>
                <button class="session-header" aria-expanded="false">
                  <span data-i18n="curriculum.part1.session1"></span>
                  
                </button>
                <div class="session-body"><p data-i18n="curriculum.part1.session1_content"></p></div>
              </li>
              <li>
                <button class="session-header" aria-expanded="false">
                  <span data-i18n="curriculum.part1.session2"></span>
                  
                </button>
                <div class="session-body"><p data-i18n="curriculum.part1.session2_content"></p></div>
              </li>
              <li>
                <button class="session-header" aria-expanded="false">
                  <span data-i18n="curriculum.part1.session3"></span>
                  
                </button>
                <div class="session-body"><p data-i18n="curriculum.part1.session3_content"></p></div>
              </li>
              <li>
                <button class="session-header" aria-expanded="false">
                  <span data-i18n="curriculum.part1.session4"></span>
                  
                </button>
                <div class="session-body"><p data-i18n="curriculum.part1.session4_content"></p></div>
              </li>
              <li>
                <button class="session-header" aria-expanded="false">
                  <span data-i18n="curriculum.part1.session5"></span>
                  
                </button>
                <div class="session-body"><p data-i18n="curriculum.part1.session5_content"></p></div>
              </li>
              <li>
                <button class="session-header" aria-expanded="false">
                  <span data-i18n="curriculum.part1.session6"></span>
                  
                </button>
                <div class="session-body"><p data-i18n="curriculum.part1.session6_content"></p></div>
              </li>
              <li>
                <button class="session-header" aria-expanded="false">
                  <span data-i18n="curriculum.part1.session7"></span>
                  
                </button>
                <div class="session-body"><p data-i18n="curriculum.part1.session7_content"></p></div>
              </li>
            </ol>
          </div>

          <div class="curriculum-part part-2">
            <h3>
              <span class="section-label" data-i18n="curriculum.part2.label"></span>
              <span class="section-title" data-i18n="curriculum.part2.title"></span>
            </h3>
            <ol start="8">
              <li>
                <button class="session-header" aria-expanded="false">
                  <span data-i18n="curriculum.part2.session8"></span>
                  
                </button>
                <div class="session-body"><p data-i18n="curriculum.part2.session8_content"></p></div>
              </li>
              <li>
                <button class="session-header" aria-expanded="false">
                  <span data-i18n="curriculum.part2.session9"></span>
                  
                </button>
                <div class="session-body"><p data-i18n="curriculum.part2.session9_content"></p></div>
              </li>
              <li>
                <button class="session-header" aria-expanded="false">
                  <span data-i18n="curriculum.part2.session10"></span>
                  
                </button>
                <div class="session-body"><p data-i18n="curriculum.part2.session10_content"></p></div>
              </li>
              <li>
                <button class="session-header" aria-expanded="false">
                  <span data-i18n="curriculum.part2.session11"></span>
                  
                </button>
                <div class="session-body"><p data-i18n="curriculum.part2.session11_content"></p></div>
              </li>
              <li>
                <button class="session-header" aria-expanded="false">
                  <span data-i18n="curriculum.part2.session12"></span>
                  
                </button>
                <div class="session-body"><p data-i18n="curriculum.part2.session12_content"></p></div>
              </li>
              <li>
                <button class="session-header" aria-expanded="false">
                  <span data-i18n="curriculum.part2.session13"></span>
                  
                </button>
                <div class="session-body"><p data-i18n="curriculum.part2.session13_content"></p></div>
              </li>
              <li>
                <button class="session-header" aria-expanded="false">
                  <span data-i18n="curriculum.part2.session14"></span>
                  
                </button>
                <div class="session-body"><p data-i18n="curriculum.part2.session14_content"></p></div>
              </li>
            </ol>
          </div>

        </div>
      </div>
    </section>
  </main>

  <section id="cta">
    <div class="cta-inner">
      <div class="cta-left">
        <p class="cta-label" data-i18n="cta.label"></p>
        <div class="cta-price"><span data-i18n="cta.amount"></span><span class="cta-currency" data-i18n="cta.currency"></span></div>
        <p class="cta-note" data-i18n="cta.note"></p>
      </div>
      <a href="#kontakt" class="cta-btn" data-i18n="cta.button"></a>
    </div>
  </section>

  <section id="about">
    <div class="about-inner">
      <h2 data-i18n="about.heading"></h2>
      <p data-i18n="about.p1"></p>
      <p data-i18n="about.p2"></p>
    </div>
  </section>

  <section id="kontakt">
    <div class="contact-outer">
      <h2 data-i18n="contact.heading"></h2>
      <div class="contact-grid">
        <div class="contact-info">
          <h3 data-i18n="contact.infoTitle"></h3>
          <p data-i18n="contact.infoDesc"></p>
          <div class="contact-details">
            <div class="contact-item">
              <span class="contact-icon">✉</span>
              <span>info@sokraft.com</span>
            </div>
            <div class="contact-item">
              <span class="contact-icon">⌂</span>
              <span>Sokraft d.o.o, Novi Sad</span>
            </div>
            <div class="contact-item">
              <span class="contact-icon">🎓</span>
              <span data-i18n="contact.partner"></span>
            </div>
          </div>
        </div>
        <form class="contact-form" onsubmit="handleSubmit(event)">
          <div class="form-group">
            <label for="name" data-i18n="contact.form.name"></label>
            <input type="text" id="name" name="name" required data-i18n-placeholder="contact.form.namePlaceholder">
          </div>
          <div class="form-group">
            <label for="email" data-i18n="contact.form.email"></label>
            <input type="email" id="email" name="email" required placeholder="vas@email.com">
          </div>
          <div class="form-group">
            <label for="company" data-i18n="contact.form.company"></label>
            <input type="text" id="company" name="company" data-i18n-placeholder="contact.form.companyPlaceholder">
          </div>
          <div class="form-group">
            <label for="message" data-i18n="contact.form.message"></label>
            <textarea id="message" name="message" data-i18n-placeholder="contact.form.messagePlaceholder"></textarea>
          </div>
          <button type="submit" class="contact-btn" data-i18n="contact.form.submit"></button>
        </form>
      </div>
    </div>
  </section>

  <script src="js/i18n.js"></script>
  <script src="js/tree.js"></script>
  <script src="js/accordion.js"></script>
</body>
</html>
